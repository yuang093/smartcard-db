version: "3.9"

services:
  # ── PostgreSQL 16 ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartcard_v2_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartcard
      POSTGRES_PASSWORD: smartcard_password
      POSTGRES_DB: smartcard
    volumes:
      - ./volumes/pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcard -d smartcard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartcard_v2_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://smartcard:smartcard_password@postgres:5432/smartcard
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    volumes:
      - ./backups:/backups
      - ./volumes/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartcard_v2_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  # ── Cloudflare Tunnel ───────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smartcard_v2_cloudflared
    restart: unless-stopped
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run --token "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - frontend

volumes:
  pg_data: